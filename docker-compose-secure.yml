services:
  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "127.0.0.1:6379:6379" # Bind to localhost only
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword123}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devpassword123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devpassword123}
      - HTTP_USER=${REDIS_COMMANDER_USER:-admin}
      - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD:-admin123}
    ports:
      - "127.0.0.1:8081:8081" # Bind to localhost only
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
